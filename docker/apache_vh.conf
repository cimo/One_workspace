ServerName localhost

Listen ${APACHE_SERVER_PORT}

SSLCipherSuite HIGH:MEDIUM:!MD5:!RC4:!3DES
SSLProxyCipherSuite HIGH:MEDIUM:!MD5:!RC4:!3DES
SSLHonorCipherOrder on
SSLProtocol all -SSLv3
SSLProxyProtocol all -SSLv3
SSLPassPhraseDialog builtin
SSLSessionCache "shmcb:/var/log/apache2/ssl_scache(512000)"
SSLSessionCacheTimeout 300

<VirtualHost *:${APACHE_SERVER_PORT}>
    SSLEngine on
    SSLCertificateKeyFile "/usr/local/share/ca-certificates/tls.key"
    SSLCertificateFile "/usr/local/share/ca-certificates/tls.crt"

    DocumentRoot ${PATH_ROOT}project/app_jsmvcfw/public/

    <Directory "${PATH_ROOT}project/app_jsmvcfw/public/">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_URI} !^/server-status$
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]

        DirectoryIndex index.html index.php
    </Directory>

    ErrorLog /var/log/apache2/error_log
    CustomLog /var/log/apache2/access_log common
</VirtualHost>
